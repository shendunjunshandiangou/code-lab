name: 检查 Quartz PR

on:
  pull_request:
    branches:
      - master
    paths:
      - '胶片相机选购指南/**'
      - '.github/workflows/check-quartz-pr.yml'
  push:
    branches:
      - 'agent/**'
    paths:
      - '胶片相机选购指南/**'
      - '.github/workflows/check-quartz-pr.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: 胶片相机选购指南/quartz/package-lock.json

      - name: 安装依赖
        working-directory: ./胶片相机选购指南/quartz
        run: npm ci

      - name: TypeScript 类型检查
        working-directory: ./胶片相机选购指南/quartz
        run: npx tsc --noEmit

      - name: 检查 Quartz 配置格式
        working-directory: ./胶片相机选购指南/quartz
        run: npx prettier quartz.config.ts quartz.layout.ts --check

      - name: 检查 custom.scss 格式
        working-directory: ./胶片相机选购指南/quartz
        continue-on-error: true
        run: npx prettier quartz/styles/custom.scss --check

      - name: 构建网站
        working-directory: ./胶片相机选购指南/quartz
        run: node quartz/bootstrap-cli.mjs build --directory ..

      - name: 检查首页构建产物
        working-directory: ./胶片相机选购指南/quartz
        run: |
          test -f public/index.html
          echo "index.html bytes: $(wc -c < public/index.html)"
          grep -o 'article class="[^"]*"' public/index.html | head -n 5 || true
          grep -o 'home-shell' public/index.html | head -n 5 || true
          grep -o '从第一卷胶片' public/index.html | head -n 5 || true
