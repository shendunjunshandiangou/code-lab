name: 检查 Quartz PR

on:
  pull_request:
    branches:
      - master
    paths:
      - '胶片相机选购指南/**'
      - '.github/workflows/check-quartz-pr.yml'
      - '.github/workflows/deploy-quartz.yml'
  workflow_dispatch:

concurrency:
  group: quartz-pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 检查内容源路径
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          changed_files="$(git diff --name-only '${{ github.event.pull_request.base.sha }}'...HEAD)"
          wrong_source="$(printf '%s\n' "$changed_files" | grep '^胶片相机选购指南/quartz/content/' || true)"

          if [ -n "$wrong_source" ]; then
            echo '::error::检测到修改了未参与当前构建的 quartz/content 副本。请改为编辑胶片相机选购指南根目录中的 index.md、02_atoms 或 04_knowledge。'
            printf '%s\n' "$wrong_source"
            exit 1
          fi

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: 胶片相机选购指南/quartz/package-lock.json

      - name: 安装依赖
        working-directory: ./胶片相机选购指南/quartz
        run: npm ci

      - name: TypeScript 类型检查
        working-directory: ./胶片相机选购指南/quartz
        run: npx tsc --noEmit

      - name: 构建网站
        working-directory: ./胶片相机选购指南/quartz
        run: node quartz/bootstrap-cli.mjs build --directory ..

      - name: 发布并验证在线预览
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        env:
          GH_TOKEN: ${{ github.token }}
          PREVIEW_URL: https://shendunjunshandiangou.github.io/code-lab/preview/
        shell: bash
        run: |
          gh workflow run deploy-quartz.yml \
            --ref master \
            --field preview_ref='${{ github.head_ref }}'

          sleep 5
          run_id="$(gh run list \
            --workflow deploy-quartz.yml \
            --branch master \
            --event workflow_dispatch \
            --limit 1 \
            --json databaseId \
            --jq '.[0].databaseId')"

          if [ -z "$run_id" ]; then
            echo '::error::没有找到在线预览部署任务。'
            exit 1
          fi

          echo "等待部署任务 $run_id 完成"
          gh run watch "$run_id" --exit-status

          for attempt in $(seq 1 12); do
            if curl -fsSL "$PREVIEW_URL" | grep -q 'home-shell'; then
              echo "在线预览已更新：$PREVIEW_URL"
              exit 0
            fi

            echo "等待 GitHub Pages 生效（$attempt/12）"
            sleep 5
          done

          echo '::error::部署任务已完成，但在线预览页面尚未出现预期首页内容。'
          exit 1
