name: 检查 Quartz PR

on:
  pull_request:
    branches:
      - master
    paths:
      - '胶片相机选购指南/**'
      - '.github/workflows/check-quartz-pr.yml'
      - '.github/workflows/deploy-quartz.yml'
  workflow_dispatch:

concurrency:
  group: quartz-pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 统一机型页面并本地化图片
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        env:
          HEAD_REF: ${{ github.head_ref }}
        shell: bash
        run: |
          git checkout -B "$HEAD_REF" "origin/$HEAD_REF"
          node 胶片相机选购指南/scripts/upgrade-camera-detail-v2.mjs
          node 胶片相机选购指南/scripts/normalize-camera-pages.mjs
          node 胶片相机选购指南/scripts/localize-images.mjs

          if [ -z "$(git status --porcelain -- 胶片相机选购指南)" ]; then
            echo '机型页面和本地图片已经符合当前规范。'
          else
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git add -- 胶片相机选购指南
            git commit -m '本地化已核验图片并统一机型页面'
            git push origin "HEAD:$HEAD_REF"
          fi

      - name: 检查内容源路径
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          changed_files="$(git diff --name-only '${{ github.event.pull_request.base.sha }}'...HEAD)"
          wrong_source="$(printf '%s\n' "$changed_files" | grep '^胶片相机选购指南/quartz/content/' || true)"

          if [ -n "$wrong_source" ]; then
            echo '::error::检测到修改了未参与当前构建的 quartz/content 副本。请改为编辑胶片相机选购指南根目录中的 index.md、02_atoms 或 04_knowledge。'
            printf '%s\n' "$wrong_source"
            exit 1
          fi

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: 胶片相机选购指南/quartz/package-lock.json

      - name: 安装依赖
        working-directory: ./胶片相机选购指南/quartz
        run: npm ci

      - name: TypeScript 类型检查
        working-directory: ./胶片相机选购指南/quartz
        run: npx tsc --noEmit

      - name: 构建网站
        working-directory: ./胶片相机选购指南/quartz
        run: node quartz/bootstrap-cli.mjs build --directory ..

      - name: 发布并验证在线预览
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        env:
          GH_TOKEN: ${{ github.token }}
          PREVIEW_URL: https://shendunjunshandiangou.github.io/code-lab/preview/
          PR_NUMBER: ${{ github.event.pull_request.number }}
        shell: bash
        run: |
          BUILD_SHA="$(git rev-parse HEAD)"
          gh workflow run deploy-quartz.yml \
            --ref master \
            --field preview_ref='${{ github.head_ref }}'

          sleep 5
          run_id="$(gh run list \
            --workflow deploy-quartz.yml \
            --branch master \
            --event workflow_dispatch \
            --limit 1 \
            --json databaseId \
            --jq '.[0].databaseId')"

          if [ -z "$run_id" ]; then
            echo '::error::没有找到在线预览部署任务。'
            exit 1
          fi

          echo "等待部署任务 $run_id 完成"
          deploy_conclusion=''
          for attempt in $(seq 1 180); do
            state="$(gh run view "$run_id" --json status,conclusion --jq '.status + "|" + (.conclusion // "")')"
            status="${state%%|*}"
            conclusion="${state#*|}"
            echo "部署状态（$attempt/180）：$status ${conclusion}"

            if [ "$status" = 'completed' ]; then
              deploy_conclusion="$conclusion"
              break
            fi
            sleep 5
          done

          if [ "$deploy_conclusion" != 'success' ]; then
            gh run view "$run_id" --log-failed > deploy-failure.log 2>&1 || true
            {
              echo '## 在线预览部署失败'
              echo
              echo "部署任务：\`$run_id\`，结论：\`${deploy_conclusion:-timeout}\`"
              echo
              echo '```text'
              tail -n 120 deploy-failure.log
              echo '```'
            } > deploy-comment.md
            gh pr comment "$PR_NUMBER" --body-file deploy-comment.md
            exit 1
          fi

          for attempt in $(seq 1 24); do
            home_url="${PREVIEW_URL}?build=${BUILD_SHA}&attempt=${attempt}"
            new_route_url="${PREVIEW_URL}cameras/nikon-fm2?build=${BUILD_SHA}&attempt=${attempt}"
            old_route_url="${PREVIEW_URL}02_atoms/models/%E5%B0%BC%E5%BA%B7-FM2?build=${BUILD_SHA}&attempt=${attempt}"

            home_ok=0
            new_route_ok=0
            old_route_ok=0
            curl -fsSL -H 'Cache-Control: no-cache, no-store, must-revalidate' -H 'Pragma: no-cache' "$home_url" | grep -q 'home-shell' && home_ok=1 || true
            curl -fsSL -H 'Cache-Control: no-cache, no-store, must-revalidate' -H 'Pragma: no-cache' "$new_route_url" | grep -q '尼康 FM2' && new_route_ok=1 || true
            curl -fsSL -H 'Cache-Control: no-cache, no-store, must-revalidate' -H 'Pragma: no-cache' "$old_route_url" | grep -q 'cameras/nikon-fm2' && old_route_ok=1 || true

            if [ "$home_ok" = 1 ] && [ "$new_route_ok" = 1 ] && [ "$old_route_ok" = 1 ]; then
              echo "在线预览与新旧机型路由均已更新：$home_url"
              exit 0
            fi

            echo "等待 GitHub Pages 生效（$attempt/24）：home=$home_ok new=$new_route_ok old=$old_route_ok"
            sleep 5
          done

          {
            echo '## 在线预览内容验证失败'
            echo
            echo "部署任务 \`$run_id\` 已成功，但首页、新机型路由或旧地址跳转在等待后仍未全部生效："
            echo
            echo "- 首页：${PREVIEW_URL}?build=${BUILD_SHA}"
            echo "- 新地址：${PREVIEW_URL}cameras/nikon-fm2?build=${BUILD_SHA}"
            echo "- 旧地址：${PREVIEW_URL}02_atoms/models/%E5%B0%BC%E5%BA%B7-FM2?build=${BUILD_SHA}"
          } > deploy-comment.md
          gh pr comment "$PR_NUMBER" --body-file deploy-comment.md
          exit 1
