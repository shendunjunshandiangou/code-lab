name: 检查 Quartz PR

on:
  pull_request:
    branches:
      - master
    paths:
      - '胶片相机选购指南/**'
      - '.github/workflows/check-quartz-pr.yml'
      - '.github/workflows/deploy-quartz.yml'
  workflow_dispatch:

concurrency:
  group: quartz-pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 检查详情版本、本地化图片并生成审计
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        env:
          HEAD_REF: ${{ github.head_ref }}
        shell: bash
        run: |
          git checkout -B "$HEAD_REF" "origin/$HEAD_REF"
          node 胶片相机选购指南/scripts/upgrade-camera-detail-v2.mjs
          # normalize-camera-pages.mjs 仅用于首次批量收口，不在 CI 中反复执行，避免覆盖人工精修内容。
          node 胶片相机选购指南/scripts/backfill-simple-camera-weight.mjs
          node 胶片相机选购指南/scripts/localize-images.mjs
          node 胶片相机选购指南/scripts/audit-camera-content.mjs

          if [ -z "$(git status --porcelain -- 胶片相机选购指南)" ]; then
            echo '详情版本、本地图片和内容审计已经符合当前规范。'
          else
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git add -- 胶片相机选购指南
            git commit -m '更新机型图片、页面与内容审计'
            git push origin "HEAD:$HEAD_REF"
          fi

      - name: 检查内容源路径
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          changed_files="$(git diff --name-only '${{ github.event.pull_request.base.sha }}'...HEAD)"
          wrong_source="$(printf '%s\n' "$changed_files" | grep '^胶片相机选购指南/quartz/content/' || true)"

          if [ -n "$wrong_source" ]; then
            echo '::error::检测到修改了未参与当前构建的 quartz/content 副本。请改为编辑胶片相机选购指南根目录中的 index.md、02_atoms 或 04_knowledge。'
            printf '%s\n' "$wrong_source"
            exit 1
          fi

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: 胶片相机选购指南/quartz/package-lock.json

      - name: 安装依赖
        working-directory: ./胶片相机选购指南/quartz
        run: npm ci

      - name: TypeScript 类型检查
        working-directory: ./胶片相机选购指南/quartz
        run: npx tsc --noEmit

      - name: 构建网站
        working-directory: ./胶片相机选购指南/quartz
        run: node quartz/bootstrap-cli.mjs build --directory ..

      - name: 验收构建产物
        shell: bash
        run: node 胶片相机选购指南/scripts/validate-built-site.mjs 胶片相机选购指南/quartz/public

      - name: 发布并验证在线预览
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        env:
          GH_TOKEN: ${{ github.token }}
          PREVIEW_URL: https://shendunjunshandiangou.github.io/code-lab/preview/
          PR_NUMBER: ${{ github.event.pull_request.number }}
        shell: bash
        run: |
          BUILD_SHA="$(git rev-parse HEAD)"
          gh workflow run deploy-quartz.yml \
            --ref master \
            --field preview_ref='${{ github.head_ref }}'

          sleep 5
          run_id="$(gh run list \
            --workflow deploy-quartz.yml \
            --branch master \
            --event workflow_dispatch \
            --limit 1 \
            --json databaseId \
            --jq '.[0].databaseId')"

          if [ -z "$run_id" ]; then
            echo '::error::没有找到在线预览部署任务。'
            exit 1
          fi

          echo "等待部署任务 $run_id 完成"
          deploy_conclusion=''
          for attempt in $(seq 1 180); do
            state="$(gh run view "$run_id" --json status,conclusion --jq '.status + "|" + (.conclusion // "")')"
            status="${state%%|*}"
            conclusion="${state#*|}"
            echo "部署状态（$attempt/180）：$status ${conclusion}"

            if [ "$status" = 'completed' ]; then
              deploy_conclusion="$conclusion"
              break
            fi
            sleep 5
          done

          if [ "$deploy_conclusion" != 'success' ]; then
            gh run view "$run_id" --log-failed > deploy-failure.log 2>&1 || true
            {
              echo '## 在线预览部署失败'
              echo
              echo "部署任务：\`$run_id\`，结论：\`${deploy_conclusion:-timeout}\`"
              echo
              echo '```text'
              tail -n 120 deploy-failure.log
              echo '```'
            } > deploy-comment.md
            gh pr comment "$PR_NUMBER" --body-file deploy-comment.md
            exit 1
          fi

          rm -rf preview-artifact preview-site
          mkdir -p preview-artifact preview-site
          gh run download "$run_id" --name github-pages --dir preview-artifact
          artifact_tar="$(find preview-artifact -name artifact.tar -print -quit)"
          if [ -z "$artifact_tar" ]; then
            echo '::error::部署产物中没有找到 artifact.tar。'
            exit 1
          fi
          tar -xf "$artifact_tar" -C preview-site

          new_route_file='preview-site/preview/cameras/nikon-fm2.html'
          old_route_file='preview-site/preview/02_atoms/models/尼康-FM2.html'
          test -f "$new_route_file"
          grep -q '尼康 FM2' "$new_route_file"
          test -f "$old_route_file"
          grep -q 'cameras/nikon-fm2' "$old_route_file"
          echo '部署产物已确认：新机型页面和旧地址重定向均存在。'

          for attempt in $(seq 1 24); do
            home_url="${PREVIEW_URL}?build=${BUILD_SHA}&attempt=${attempt}"
            if curl -fsSL \
              -H 'Cache-Control: no-cache, no-store, must-revalidate' \
              -H 'Pragma: no-cache' \
              "$home_url" | grep -q 'home-shell'; then
              echo "在线预览已更新：$home_url"
              exit 0
            fi

            echo "等待 GitHub Pages 首页生效（$attempt/24）"
            sleep 5
          done

          {
            echo '## 在线预览内容验证失败'
            echo
            echo "部署任务 \`$run_id\` 与新旧机型路由产物均已成功，但在线首页在等待后仍未更新："
            echo
            echo "${PREVIEW_URL}?build=${BUILD_SHA}"
          } > deploy-comment.md
          gh pr comment "$PR_NUMBER" --body-file deploy-comment.md
          exit 1
